name: vigil-cv
channels:
  - conda-forge
  - pytorch
  - nvidia
  - defaults

dependencies:
  - python=3.11
  - pytorch>=2.3
  - torchvision>=0.18
  - pytorch-cuda=12.4
  - numpy>=1.26
  - scipy>=1.12
  - scikit-learn>=1.4
  - pandas>=2.2
  - matplotlib>=3.8
  - tqdm>=4.66
  - rich>=13.0
  - pytest>=8.0
  - pip
  - pip:
      - onnx>=1.16
      - onnxruntime-gpu>=1.18
      - onnxsim>=0.4
      - opencv-python-headless>=4.9
      - gradio>=4.0
      - faiss-cpu>=1.8
      # faiss-gpu: install via pip on Windows if conda build unavailable
      # faiss-gpu>=1.8
      # tensorrt: must be installed manually from NVIDIA zip package on Windows
      # See README.md "TensorRT on Windows" section for instructions
